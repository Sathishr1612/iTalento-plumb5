<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>iTalento - Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root {
      --primary: #2d8a86;
      --primary-dark: #246f6b;
      --bg: #edf2f5;
      --card: rgba(255,255,255,0.92);
      --text: #183648;
      --muted: #6b7280;
      --soft: #94a3b8;
      --border: #dbe4ea;
      --input: #f4f8fb;
      --white: #ffffff;
      --danger: #ef4444;
      --success: #10b981;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at 50% 50%, rgba(45, 138, 134, 0.06), transparent 50vmin),
        linear-gradient(180deg, #edf2f5 0%, #eef3f6 100%);
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
      position: relative;
    }

    .auth-page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      position: relative;
      overflow: hidden;
    }

    .auth-page::before {
      content: "";
      position: absolute;
      width: min(90vmin, 760px);
      height: min(90vmin, 760px);
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(24, 54, 72, 0.04);
      box-shadow:
        0 0 0 90px rgba(24, 54, 72, 0.018),
        0 0 0 180px rgba(24, 54, 72, 0.012);
      pointer-events: none;
      z-index: 0;
    }

    .auth-page::after {
      content: "";
      position: absolute;
      width: min(50vmin, 420px);
      height: min(50vmin, 420px);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(45,138,134,0.08), transparent 72%);
      filter: blur(20px);
      pointer-events: none;
      z-index: 0;
    }

    .auth-card {
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 2;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.82);
      border-radius: 30px;
      padding: 34px 28px 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      text-align: center;
    }

    .auth-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(180deg, rgba(124, 199, 194, 0.45), rgba(255,255,255,0.12));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      text-decoration: none;
      color: inherit;
    }

    .brand-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), #74cfc6);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 14px 28px rgba(45, 138, 134, 0.20);
      flex-shrink: 0;
    }

    .brand-text {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: #1b4a63;
      line-height: 1;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .input-wrap {
      position: relative;
    }

    .form-control {
      width: 100%;
      height: 60px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--input);
      padding: 0 52px 0 18px;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: all 0.22s ease;
      font-family: inherit;
    }

    .form-control::placeholder {
      color: #94a3b8;
      font-weight: 500;
    }

    .form-control:hover {
      border-color: #cad6de;
      background: #f7fafc;
    }

    .form-control:focus {
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(45, 138, 134, 0.10);
    }

    .password-toggle {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 10px;
      color: #94a3b8;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .password-toggle:hover {
      background: #edf5f6;
      color: var(--primary);
    }

    .password-toggle:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .btn-primary {
      width: 100%;
      height: 62px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.22s ease;
      box-shadow: 0 16px 32px rgba(45, 138, 134, 0.22);
      margin-top: 6px;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 20px 38px rgba(36, 111, 107, 0.26);
    }

    .btn-primary:disabled {
      opacity: 0.8;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .auth-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }

    .auth-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      transition: color 0.2s ease;
    }

    .auth-link:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .form-message {
      min-height: 20px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      width: 100%;
      padding: 0 8px;
    }

    .form-message.error { color: var(--danger); }
    .form-message.success { color: var(--success); }

    .auth-footer {
      margin-top: 18px;
      color: #708194;
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    /* Password reset specific styles */
    .password-section {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .password-section.visible {
      max-height: 500px;
      opacity: 1;
      margin-top: 16px;
    }

    .otp-section {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .otp-section.visible {
      max-height: 200px;
      opacity: 1;
      margin-top: 16px;
    }

    .helper-text {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      margin-bottom: 4px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .helper-text i {
      font-size: 14px;
      color: var(--primary);
    }

    .validation-hint {
      font-size: 12px;
      color: var(--soft);
      margin-top: 6px;
      margin-bottom: 4px;
      font-weight: 500;
      padding-left: 4px;
    }

    .otp-input {
      letter-spacing: 8px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      font-family: 'Inter', monospace;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 14px;
    }

    @media (max-width: 767px) {
      .auth-page {
        padding: 20px 16px;
        align-items: flex-start;
        padding-top: 10vh;
      }

      .auth-page::before {
        width: min(120vmin, 520px);
        height: min(120vmin, 520px);
        box-shadow:
          0 0 0 60px rgba(24, 54, 72, 0.018),
          0 0 0 120px rgba(24, 54, 72, 0.012);
      }

      .auth-card {
        border-radius: 24px;
        padding: 28px 22px 20px;
        max-width: 100%;
      }

      .brand {
        gap: 10px;
        margin-bottom: 20px;
      }

      .brand-icon {
        width: 50px;
        height: 50px;
        border-radius: 16px;
        font-size: 22px;
      }

      .brand-text {
        font-size: 28px;
      }

      .page-title {
        font-size: 20px;
      }

      .page-subtitle {
        font-size: 13px;
        margin-bottom: 20px;
      }

      .form-control {
        height: 56px;
        border-radius: 16px;
        font-size: 16px;
        padding: 0 48px 0 16px;
      }

      .otp-input {
        font-size: 18px;
        letter-spacing: 6px;
      }

      .password-toggle {
        width: 34px;
        height: 34px;
        right: 10px;
        font-size: 17px;
      }

      .btn-primary {
        height: 58px;
        border-radius: 16px;
        font-size: 17px;
      }

      .auth-link {
        font-size: 14px;
      }

      .auth-footer {
        font-size: 12px;
        margin-top: 16px;
      }

      .form-message {
        font-size: 13px;
      }

      .helper-text {
        font-size: 12px;
      }

      .validation-hint {
        font-size: 11px;
      }
    }

    @media (max-width: 360px) {
      .auth-card {
        padding: 24px 18px 18px;
      }
      
      .brand-text {
        font-size: 24px;
      }

      .page-title {
        font-size: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: slideDown 0.3s ease forwards;
    }
  </style>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a href="index.html" class="brand" aria-label="iTalento Home">
        <div class="brand-icon">
          <i class="bi bi-people-fill" aria-hidden="true"></i>
        </div>
        <div class="brand-text">iTalento</div>
      </a>

      <h1 class="page-title">Reset Password</h1>
      <p class="page-subtitle">Enter your email to receive a verification code</p>

      <form id="resetForm" novalidate>
        <!-- Step 1: Email Input -->
        <div class="form-group" id="emailGroup">
          <div class="input-wrap">
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="Enter your work email"
              autocomplete="email"
              required
              aria-required="true"
              aria-label="Work Email"
            />
          </div>
        </div>

        <!-- Step 2 & 3: Password Fields (Hidden initially) -->
        <div class="password-section" id="passwordSection">
          <div class="form-group">
            <div class="input-wrap">
              <input
                type="password"
                id="newPassword"
                class="form-control"
                placeholder="Enter new password"
                autocomplete="new-password"
                aria-label="New Password"
              />
              <button type="button" class="password-toggle" id="toggleNewPassword" aria-label="Toggle password visibility" title="Toggle password visibility">
                <i class="bi bi-eye" aria-hidden="true"></i>
              </button>
            </div>
            <p class="validation-hint">Password must contain 1 uppercase, 1 lowercase, 1 number, 1 special character</p>
          </div>

          <div class="form-group">
            <div class="input-wrap">
              <input
                type="password"
                id="confirmPassword"
                class="form-control"
                placeholder="Confirm new password"
                autocomplete="new-password"
                aria-label="Confirm Password"
              />
              <button type="button" class="password-toggle" id="toggleConfirmPassword" aria-label="Toggle password visibility" title="Toggle password visibility">
                <i class="bi bi-eye" aria-hidden="true"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Step 3: OTP Input (Hidden initially) -->
        <div class="otp-section" id="otpSection">
          <div class="form-group">
            <div class="input-wrap">
              <input
                type="text"
                id="otp"
                class="form-control otp-input"
                placeholder="000000"
                maxlength="6"
                inputmode="numeric"
                autocomplete="one-time-code"
                aria-label="6-digit OTP Code"
              />
            </div>
            <p class="helper-text">
              <i class="bi bi-shield-check"></i>
              Enter the 6-digit code sent to your email
            </p>
          </div>
        </div>

        <!-- Dynamic Button -->
        <button type="submit" class="btn-primary" id="actionBtn">
          <i class="bi bi-envelope-arrow-up" aria-hidden="true"></i>
          <span>Request OTP</span>
        </button>

        <!-- Messages -->
        <div class="auth-links">
          <div id="formMessage" class="form-message" role="status" aria-live="polite"></div>
        </div>
      </form>

      <!-- Back to Login -->
      <a href="index.html" class="auth-link back-link">
        <i class="bi bi-arrow-left" aria-hidden="true"></i>
        Back to Login?
      </a>

      <div class="auth-footer">© 2025 · Plumb5's Resource Management</div>
    </section>
  </main>

  <script>
    (function() {
      const resetForm = document.getElementById('resetForm');
      const emailInput = document.getElementById('email');
      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const otpInput = document.getElementById('otp');
      const passwordSection = document.getElementById('passwordSection');
      const otpSection = document.getElementById('otpSection');
      const actionBtn = document.getElementById('actionBtn');
      const formMessage = document.getElementById('formMessage');
      const emailGroup = document.getElementById('emailGroup');

      const toggleNewPassword = document.getElementById('toggleNewPassword');
      const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');

      let currentStep = 1; // 1: Email, 2: OTP requested (show password + OTP fields), 3: Submit reset

      // Password toggle functionality
      function setupToggle(toggleBtn, input) {
        toggleBtn.addEventListener('click', function() {
          const isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          toggleBtn.innerHTML = isPassword
            ? '<i class="bi bi-eye-slash" aria-hidden="true"></i>'
            : '<i class="bi bi-eye" aria-hidden="true"></i>';
          toggleBtn.setAttribute('aria-label', 
            isPassword ? 'Hide password' : 'Show password'
          );
        });
      }

      setupToggle(toggleNewPassword, newPasswordInput);
      setupToggle(toggleConfirmPassword, confirmPasswordInput);

      function validateEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      function validatePassword(password) {
        // Must contain: 1 uppercase, 1 lowercase, 1 number, 1 special char
        const hasUpper = /[A-Z]/.test(password);
        const hasLower = /[a-z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password);
        return hasUpper && hasLower && hasNumber && hasSpecial && password.length >= 8;
      }

      function setMessage(type, text) {
        formMessage.className = 'form-message ' + type;
        formMessage.textContent = text;
      }

      function setLoading(loading) {
        if (loading) {
          actionBtn.disabled = true;
          actionBtn.innerHTML = '<i class="bi bi-arrow-repeat" style="animation: spin .8s linear infinite;" aria-hidden="true"></i><span>Processing...</span>';
        } else {
          actionBtn.disabled = false;
          updateButtonState();
        }
      }

      function updateButtonState() {
        if (currentStep === 1) {
          actionBtn.innerHTML = '<i class="bi bi-envelope-arrow-up" aria-hidden="true"></i><span>Request OTP</span>';
        } else if (currentStep === 2) {
          actionBtn.innerHTML = '<i class="bi bi-shield-lock" aria-hidden="true"></i><span>Reset Password</span>';
        }
      }

      function showStep2() {
        currentStep = 2;
        
        // Disable email input
        emailInput.disabled = true;
        emailGroup.style.opacity = '0.7';
        
        // Show password fields with animation
        passwordSection.classList.add('visible');
        passwordSection.classList.add('animate-in');
        
        // Show OTP section with animation
        setTimeout(() => {
          otpSection.classList.add('visible');
          otpSection.classList.add('animate-in');
          otpInput.focus();
        }, 200);

        updateButtonState();
      }

      resetForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const email = emailInput.value.trim();

        if (currentStep === 1) {
          // Step 1: Validate email and request OTP
          formMessage.className = 'form-message';
          formMessage.textContent = '';

          if (!email) {
            setMessage('error', 'Please enter your work email.');
            return;
          }

          if (!validateEmail(email)) {
            setMessage('error', 'Please enter a valid email address.');
            return;
          }

          setLoading(true);

          // Simulate OTP request
          setTimeout(function() {
            setLoading(false);
            setMessage('success', 'OTP sent to your email address.');
            showStep2();
          }, 1200);

        } else if (currentStep === 2) {
          // Step 2: Validate OTP and passwords
          const otp = otpInput.value.trim();
          const newPassword = newPasswordInput.value;
          const confirmPassword = confirmPasswordInput.value;

          formMessage.className = 'form-message';
          formMessage.textContent = '';

          if (!otp || otp.length !== 6) {
            setMessage('error', 'Please enter the 6-digit OTP code.');
            otpInput.focus();
            return;
          }

          if (!newPassword || !confirmPassword) {
            setMessage('error', 'Please enter and confirm your new password.');
            return;
          }

          if (!validatePassword(newPassword)) {
            setMessage('error', 'Password does not meet requirements.');
            newPasswordInput.focus();
            return;
          }

          if (newPassword !== confirmPassword) {
            setMessage('error', 'Passwords do not match.');
            confirmPasswordInput.focus();
            return;
          }

          setLoading(true);

          // Simulate password reset
          setTimeout(function() {
            setLoading(false);
            setMessage('success', 'Password reset successful! Redirecting to login...');
            
            // Reset form after success
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 2000);
          }, 1500);
        }
      });

      // Clear error when user starts typing
      [emailInput, newPasswordInput, confirmPasswordInput, otpInput].forEach(input => {
        input.addEventListener('input', function() {
          if (formMessage.textContent && !formMessage.classList.contains('success')) {
            formMessage.textContent = '';
            formMessage.className = 'form-message';
          }
        });
      });

      // OTP input: only allow numbers
      otpInput.addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
      });

      // Email input: enable editing if user wants to change
      emailInput.addEventListener('dblclick', function() {
        if (currentStep === 2) {
          if (confirm('Start over with a different email?')) {
            location.reload();
          }
        }
      });
    })();
  </script>
</body>
</html>
