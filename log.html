<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iTalento Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root {
      --primary: #2d8a86;
      --primary-dark: #246f6b;
      --bg: #edf2f5;
      --card: rgba(255,255,255,0.92);
      --text: #183648;
      --muted: #6b7280;
      --soft: #94a3b8;
      --border: #dbe4ea;
      --input: #f4f8fb;
      --white: #ffffff;
      --danger: #ef4444;
      --success: #10b981;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 50% 50%, rgba(45, 138, 134, 0.05), transparent 22%),
        linear-gradient(180deg, #edf2f5 0%, #eef3f6 100%);
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
    }

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      position: relative;
      overflow: hidden;
    }

    .auth-page::before {
      content: "";
      position: absolute;
      width: 760px;
      height: 760px;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(24, 54, 72, 0.04);
      box-shadow:
        0 0 0 90px rgba(24, 54, 72, 0.018),
        0 0 0 180px rgba(24, 54, 72, 0.012);
      pointer-events: none;
    }

    .auth-page::after {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(45,138,134,0.08), transparent 72%);
      filter: blur(20px);
      pointer-events: none;
    }

    .auth-card {
      width: 100%;
      max-width: 540px;
      position: relative;
      z-index: 2;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.82);
      border-radius: 30px;
      padding: 34px 28px 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      text-align: center;
    }

    .auth-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(180deg, rgba(124, 199, 194, 0.45), rgba(255,255,255,0.12));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      text-decoration: none;
      color: inherit;
    }

    .brand-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), #74cfc6);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 14px 28px rgba(45, 138, 134, 0.20);
    }

    .brand-text {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: #1b4a63;
      line-height: 1;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .input-wrap {
      position: relative;
    }

    .form-control {
      width: 100%;
      height: 60px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--input);
      padding: 0 52px 0 18px;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: all 0.22s ease;
    }

    .form-control::placeholder {
      color: #94a3b8;
      font-weight: 500;
    }

    .form-control:hover {
      border-color: #cad6de;
      background: #f7fafc;
    }

    .form-control:focus {
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(45, 138, 134, 0.10);
    }

    .password-toggle {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 10px;
      color: #94a3b8;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .password-toggle:hover {
      background: #edf5f6;
      color: var(--primary);
    }

    .btn-primary {
      width: 100%;
      height: 62px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.22s ease;
      box-shadow: 0 16px 32px rgba(45, 138, 134, 0.22);
      margin-top: 6px;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 38px rgba(36, 111, 107, 0.26);
    }

    .btn-primary:disabled {
      opacity: 0.8;
      cursor: not-allowed;
      transform: none;
    }

    .auth-links {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    .auth-link {
      color: var(--primary);
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      transition: color 0.2s ease;
    }

    .auth-link:hover {
      color: var(--primary-dark);
    }

    .form-message {
      min-height: 18px;
      font-size: 13px;
      font-weight: 700;
    }

    .form-message.error { color: var(--danger); }
    .form-message.success { color: var(--success); }

    .auth-footer {
      margin-top: 16px;
      color: #708194;
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    @media (max-width: 767px) {
      .auth-page {
        padding: 20px 14px;
      }

      .auth-page::before {
        width: 520px;
        height: 520px;
        box-shadow:
          0 0 0 60px rgba(24, 54, 72, 0.018),
          0 0 0 120px rgba(24, 54, 72, 0.012);
      }

      .auth-card {
        border-radius: 24px;
        padding: 26px 18px 20px;
      }

      .brand {
        gap: 10px;
        margin-bottom: 20px;
      }

      .brand-icon {
        width: 50px;
        height: 50px;
        border-radius: 16px;
        font-size: 22px;
      }

      .brand-text {
        font-size: 28px;
      }

      .form-control {
        height: 54px;
        border-radius: 16px;
        font-size: 15px;
        padding: 0 46px 0 16px;
      }

      .password-toggle {
        width: 34px;
        height: 34px;
        right: 10px;
        font-size: 17px;
      }

      .btn-primary {
        height: 56px;
        border-radius: 16px;
        font-size: 17px;
      }

      .auth-link {
        font-size: 14px;
      }

      .auth-footer {
        font-size: 12px;
      }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a href="#" class="brand">
        <div class="brand-icon">
          <i class="bi bi-people-fill"></i>
        </div>
        <div class="brand-text">iTalento</div>
      </a>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <div class="input-wrap">
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="Enter your work email"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              class="form-control"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          <i class="bi bi-box-arrow-in-right"></i>
          <span>Log In</span>
        </button>

        <div class="auth-links">
          <div id="formMessage" class="form-message"></div>
          <a href="forgot-password.html" class="auth-link">Forgot Password?</a>
        </div>
      </form>

      <div class="auth-footer">© 2025 · Plumb5's Resource Management</div>
    </section>
  </main>

  <script>
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    const loginBtn = document.getElementById('loginBtn');
    const formMessage = document.getElementById('formMessage');

    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePassword.innerHTML = isPassword
        ? '<i class="bi bi-eye-slash"></i>'
        : '<i class="bi bi-eye"></i>';
    });

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function setMessage(type, text) {
      formMessage.className = 'form-message ' + type;
      formMessage.textContent = text;
    }

    loginForm.addEventListener('submit', function (e) {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      formMessage.className = 'form-message';
      formMessage.textContent = '';

      if (!email || !password) {
        setMessage('error', 'Please enter email and password.');
        return;
      }

      if (!validateEmail(email)) {
        setMessage('error', 'Please enter a valid email address.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="bi bi-arrow-repeat" style="animation: spin .8s linear infinite;"></i><span>Logging in...</span>';

      setTimeout(() => {
        setMessage('success', 'Login validated. Connect this form to your backend.');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i><span>Log In</span>';
      }, 1200);
    });
  </script>
</body>
</html>
